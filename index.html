<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Hub</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div class="logo">
          <span class="logo-icon">🤖</span>
          <span class="gradient-text">AI Hub</span>
        </div>
        <p class="subtitle">A curated list of AI services</p>
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input
            type="text"
            id="searchInput"
            placeholder="Search by name..."
            autocomplete="off"
          />
        </div>
      </header>

      <div class="filter-section">
        <div class="filter-group">
          <span class="filter-label">💰 Price:</span>
          <select id="pricingSelect" class="filter-select">
            <option value="all">All</option>
            <option value="Free">Free</option>
            <option value="Freemium">Freemium</option>
            <option value="Paid">Paid</option>
          </select>
        </div>
        <div class="filter-group">
          <span class="filter-label">🔒 Privacy:</span>
          <select id="privacySelect" class="filter-select">
            <option value="all">All</option>
            <option value="Privacy focused">Focused</option>
            <option value="Privacy friendly">Friendly</option>
            <option value="Not for privacy">Not private</option>
          </select>
        </div>
      </div>

      <div class="showing-count" id="countLine"></div>

      <div class="services-grid" id="servicesGrid"></div>
      <div id="emptyMessage" class="empty-message" style="display: none">
        No services match your search.
      </div>
    </div>

    <footer class="footer">
      <p>
        Data from
        <a
          href="https://github.com/SilentCoderHere/aihub-config-data"
          target="_blank"
          >AI Hub Config Data</a
        >
        · Made with ❤️
      </p>
      <p class="version" id="versionDisplay"></p>
    </footer>

    <script src="assets/js/script.js" defer></script>
  </body>
</html>
